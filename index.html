
*FEAST OR FAINT - HTML GAME*
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEAST OR FAINT - Life's Philosophy</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arial', sans-serif; }
    body {
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 10px;
    }
    #game {
        width: 100%;
        max-width: 450px;
        background: #0f0f1a;
        border-radius: 20px;
        padding: 15px;
        box-shadow: 0 0 20px rgba(255,215,0,0.2);
    }
    h1 { text-align: center; color: gold; font-size: 1.5em; margin-bottom: 5px; }
   .subtitle { text-align: center; font-size: 0.8em; color: #aaa; margin-bottom: 10px; }

    #menu, #board { display: none; }
    #menu.active, #board.active { display: block; }

   .btn {
        width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px;
        background: linear-gradient(90deg, #FFD700, #FFA500); color: #000; font-weight: bold;
        font-size: 1em; cursor: pointer; transition: 0.2s;
    }
   .btn:hover { transform: scale(1.03); }
   .btn-secondary { background: #333; color: white; }

    #stats { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.9em; }
    #timer { color: #ff5555; font-weight: bold; }

    #grid {
        display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px;
        background: #222; padding: 10px; border-radius: 10px; margin: 10px 0;
    }
   .tile {
        aspect-ratio: 1; display: flex; justify-content: center; align-items: center;
        border-radius: 8px; font-size: 1.5em; background: #333;
    }
   .tile.player { background: #00aaff; border: 2px solid white; }
   .tile.treasure { background: #FFD700; }
   .tile.waste { background: #555; }

    #rollBtn { background: linear-gradient(90deg, #00ff88, #00cc66); font-size: 1.2em; }
    #result { text-align: center; margin: 10px 0; min-height: 40px; font-weight: bold; }
</style>
</head>
<body>
<div id="game">
    <h1>FEAST OR FAINT</h1>
    <p class="subtitle">Life's Philosophy</p>

    <!-- MENU -->
    <div id="menu" class="active">
        <button class="btn" onclick="startGame('timer')">5-MINUTE TIMER</button>
        <button class="btn" onclick="startGame('points')">RACE TO 100 POINTS</button>
    </div>

    <!-- GAME BOARD -->
    <div id="board">
        <div id="stats">
            <div>Score: <span id="score">0</span></div>
            <div id="timerBox">Time: <span id="timer">5:00</span></div>
        </div>

        <div id="grid"></div>

        <div id="result">Tap ROLL to begin!</div>
        <button id="rollBtn" class="btn" onclick="rollDice()">ROLL DICE</button>
        <button class="btn btn-secondary" onclick="goToMenu()">MENU</button>
    </div>
</div>

<script>
let position = 0;
let score = 0;
let gameMode = '';
let timeLeft = 300; // 5 minutes in seconds
let timerInterval;
let tiles = [];

const grid = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const resultEl = document.getElementById('result');

// Create 30 tiles
function createBoard() {
    grid.innerHTML = '';
    tiles = [];
    for(let i = 0; i < 30; i++) {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        // Randomly set treasure or waste
        if(Math.random() < 0.3) {
            tile.classList.add('treasure');
            tile.innerText = '💎';
            tile.dataset.type = 'treasure';
        } else if(Math.random() < 0.5) {
            tile.classList.add('waste');
            tile.innerText = '🗑️';
            tile.dataset.type = 'waste';
        } else {
            tile.dataset.type = 'normal';
        }
        grid.appendChild(tile);
        tiles.push(tile);
    }
    updatePlayer();
}

function updatePlayer() {
    tiles.forEach(t => t.classList.remove('player'));
    tiles[position].classList.add('player');
}

function startGame(mode) {
    gameMode = mode;
    position = 0;
    score = 0;
    timeLeft = 300;
    createBoard();
    document.getElementById('menu').classList.remove('active');
    document.getElementById('board').classList.add('active');
    resultEl.innerText = "Game Started! Good luck!";
    scoreEl.innerText = score;

    if(gameMode === 'timer') {
        document.getElementById('timerBox').style.display = 'block';
        timerInterval = setInterval(updateTimer, 1000);
    } else {
        document.getElementById('timerBox').style.display = 'none';
    }
}

function updateTimer() {
    timeLeft--;
    let min = Math.floor(timeLeft / 60);
    let sec = timeLeft % 60;
    timerEl.innerText = `${min}:${sec.toString().padStart(2,'0')}`;
    if(timeLeft <= 0) endGame("Time's up!");
}

function rollDice() {
    let roll = Math.floor(Math.random() * 6) + 1;
    position += roll;
    if(position >= 30) position = position % 30; // Loop board

    let tile = tiles[position];
    let msg = `You rolled a ${roll}! `;

    if(tile.dataset.type === 'treasure') {
        score += 10;
        msg += "FEAST! +10 Points 💎";
    } else if(tile.dataset.type === 'waste') {
        score -= 5;
        if(score < 0) score = 0;
        msg += "FAINT! -5 Points 🗑️";
    } else {
        msg += "Safe tile.";
    }

    resultEl.innerText = msg;
    scoreEl.innerText = score;
    updatePlayer();

    if(gameMode === 'points' && score >= 100) endGame("You won! 100 Points!");
}

function endGame(reason) {
    clearInterval(timerInterval);
    resultEl.innerText = `${reason} Final Score: ${score}`;
    document.getElementById('rollBtn').disabled = true;
    setTimeout(() => {
        alert(`GAME OVER\n${reason}\nFinal Score: ${score}`);
        goToMenu();
    }, 500);
}

function goToMenu() {
    clearInterval(timerInterval);
    document.getElementById('board').classList.remove('active');
    document.getElementById('menu').classList.add('active');
    document.getElementById('rollBtn').disabled = false;
}
</script>
</body>
</html>
