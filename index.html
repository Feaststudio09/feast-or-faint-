<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FEAST OR FAINT V5.1 - 4S TURNS</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
  body {
    font-family: 'Arial Black', sans-serif;
    background: linear-gradient(180deg, #2c1a0f 0%, #1a0f08 100%);
    color: white; overflow: hidden; height: 100vh;
  }
  #game { display:flex; flex-direction:column; height:100vh; padding:6px; gap:4px; }

  /* TREASURE BOXES */
.treasure-row { display:flex; justify-content:space-between; gap:8px; }
.treasure {
    flex:1; padding:6px; border-radius:10px; text-align:center;
    border:3px solid; font-size:11px; font-weight:bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  #cpuBox { background: linear-gradient(135deg, #C0C0C0, #2F2F2F); color:#FFF; border-color:#C0C0C0; }
  #playerBox { background: linear-gradient(135deg, #FFD700, #FFF8DC); color:#000; border-color:#FFD700; }
.treasure.count { font-size:18px; margin-top:1px; }

  /* BOARD */
  #board { flex:1; display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
.row { display:flex; gap:3px; align-items:center; }
.label { width:30px; font-size:11px; text-align:center; font-weight:bold; color:#FFD700; }
.tile {
    flex:1; aspect-ratio:1; border-radius:5px;
    background:#8B4513; border:1px solid #5a2e0c;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
.tile.battleline {
    background: linear-gradient(180deg, #00FF00 50%, #FF0000 50%);
    border:3px solid #FFD700; box-shadow: 0 0 8px #FFD700;
  }
.seed {
    width:65%; height:65%; border-radius:50%;
    border:2px solid #000; box-shadow: inset 0 -2px 4px rgba(0,0,0,0.4);
    position:absolute; transition: all 0.4s ease;
  }
.seed.player { background: radial-gradient(circle at 30% 30%, #FFA500, #FF4500); }
.seed.cpu { background: radial-gradient(circle at 30% 30%, #87CEEB, #1E90FF); }

  /* DICE AREA */
  #diceArea { display:flex; justify-content:space-around; padding:4px 0; gap:4px; }
.dice {
    width:60px; height:60px; background:white; color:#000; border-radius:12px;
    display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:bold;
    border:3px solid #444; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.6);
    transition: all 0.3s ease; user-select:none;
  }
.dice:active { transform: scale(0.9); }
.dice.rolling { animation: roll 0.6s; }
.dice.active {
    border-color:#FFD700;
    box-shadow:0 0 15px #FFD700;
    transform: scale(1.05);
  }
.dice.disabled { opacity:0.4; cursor:not-allowed; }
  @keyframes roll { 0%{transform:rotate(0)} 100%{transform:rotate(720deg)} }

  #info { text-align:center; font-size:12px; padding:4px; background:rgba(0,0,0,0.4); border-radius:6px; }
</style>
</head>
<body>
<div id="game">
  <div class="treasure-row">
    <div class="treasure" id="cpuBox">CPU BOX<br><div class="count">0</div></div>
    <div class="treasure" id="playerBox">YOUR BOX<br><div class="count">0</div></div>
  </div>

  <div id="board"></div>
  <div id="info">Tap Seed Dice to start</div>
