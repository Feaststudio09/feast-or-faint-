<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FEAST OR FAINT V5.4 - 70% BOARD</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; }
  body {
    font-family: 'Arial Black', sans-serif;
    background: linear-gradient(180deg, #2c1a0f 0%, #1a0f08 100%);
    color: white; overflow: hidden; height: 100vh;
  }
  #game { display:flex; flex-direction:column; height:100vh; padding:4px; gap:3px; }

  /* TREASURE BOXES - VERTICAL */
.treasure-column { display:flex; flex-direction:column; }
.treasure {
    width:100%; padding:6px 10px; border-radius:8px; text-align:center;
    border:2px solid; font-size:11px; font-weight:bold;
    box-shadow: 0 3px 6px rgba(0,0,0,0.5);
    display:flex; justify-content:space-between; align-items:center;
  }
  #cpuBox { background: linear-gradient(135deg, #C0C0C0, #2F2F2F); color:#FFF; border-color:#C0C0C0; }
  #playerBox { background: linear-gradient(135deg, #FFD700, #FFF8DC); color:#000; border-color:#FFD700; }
.treasure.count { font-size:16px; }

  /* BOARD - NOW 70% OF SCREEN */
  #board { 
    height: 70vh; /* KEY: 70% of screen height */
    display:flex; flex-direction:column; gap:1px; overflow-y:auto; 
    padding:2px 0;
  }
.row { display:flex; gap:2px; align-items:center; }
.label { width:26px; font-size:10px; text-align:center; font-weight:bold; color:#FFD700; }
.tile {
    flex:1; aspect-ratio:1; border-radius:4px;
    background:#8B4513; border:1px solid #5a2e0c;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
.tile.battleline {
    background: linear-gradient(180deg, #00FF00 50%, #FF0000 50%);
    border:2px solid #FFD700; box-shadow: 0 0 6px #FFD700;
  }
.seed {
    width:60%; height:60%; border-radius:50%;
    border:1px solid #000; box-shadow: inset 0 -1px 3px rgba(0,0,0,0.4);
    position:absolute; transition: all 0.3s ease;
  }
.seed.player { background: radial-gradient(circle at 30% 30%, #FFA500, #FF4500); }
.seed.cpu { background: radial-gradient(circle at 30% 30%, #87CEEB, #1E90FF); }

  /* DICE AREA - PULLED CLOSER */
  #diceArea { display:flex; justify-content:space-around; padding:2px 0; gap:3px; margin-top:0; }
.dice {
    width:50px; height:50px; background:white; color:#000; border-radius:10px;
    display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold;
    border:2px solid #444; cursor:pointer; box-shadow:0 3px 5px rgba(0,0,0,0.6);
    transition: all 0.3s ease; user-select:none;
  }
.dice:active { transform: scale(0.9); }
.dice.rolling { animation: roll 0.6s; }
.dice.active {
    border-color:#FFD700;
    box-shadow:0 0 10px #FFD700;
    transform: scale(1.05);
  }
.dice.disabled { opacity:0.4; cursor:not-allowed; }
  @keyframes roll { 0%{transform:rotate(0)} 100%{transform:rotate(720deg)} }

  #info { text-align:center; font-size:11px; padding:2px; background:rgba(0,0,0,0.4); border-radius:5px; margin-bottom:1px; }
</style>
</head>
<body>
<div id="game">
  <!-- CPU BOX ON TOP -->
  <div class="treasure-column">
    <div class="treasure" id="cpuBox"><span>CPU BOX</span><span class="count">0</span></div>
  </div>

  <!-- SHARED BOARD: 70% HEIGHT -->
  <div id="board"></div>

  <div id="info">Tap Seed Dice to start</div>

  <!-- DICE NOW DIRECTLY UNDER BOARD -->
  <div id="diceArea">
    <div class="dice" id="seedDice">A1</div>
    <div class="dice" id="moveDice">1</div>
    <div class="dice" id="feastDice">+</div>
  </div>

  <!-- PLAYER BOX ON BOTTOM -->
  <div class="treasure-column">
    <div class="treasure" id="playerBox"><span>YOUR BOX</span><span class="count">0</span></div>
  </div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(f, t=0.1){ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t); o.start(); o.stop(audioCtx.currentTime + t); }

const SEEDS = ['A1','A2','B3','C4','D5','E6'];
const MOVE_FACES = [1,1,2,2,3,'X'];
const FEAST_FACES = ['+','+','+','-','-','-'];
const TOTAL_ROWS = 14;
const CENTER_ROW = 7;
const TURN_DELAY = 4000;

let boardState = {player:{}, cpu:{}};
let feasted = {player:0, cpu:0};
let gameOver = false;
let turn = 'player';
let phase = 'seed';
let selectedSeed = null;
let turnTimer = null;

const board = document.getElementById('board');
const info = document.getElementById('info');
const seedDice = document.getElementById('seedDice');
const moveDice = document.getElementById('moveDice');
const feastDice = document.getElementById('feastDice');

// INIT BOARD STATE
SEEDS.forEach(seed => {
  boardState.player = TOTAL_ROWS;
  boardState.cpu = 1;
});

// BUILD BOARD
SEEDS.forEach(seed => {
  const row = document.createElement('div'); row.className='row';
  const label = document.createElement('div'); label.className='label'; label.textContent=seed;
  row.appendChild(label);
  for(let i=1; i<=TOTAL_ROWS; i++){
    const tile = document.createElement('div');
    tile.className='tile'; tile.id=`${seed}-${i}`;
    if(i === CENTER_ROW) tile.classList.add('battleline');
    if(i === 1){
      const s = document.createElement('div'); s.className='seed cpu'; s.id=`seed-cpu-${seed}`;
      tile.appendChild(s);
    }
    if(i === TOTAL_ROWS){
      const s = document.createElement('div'); s.className='seed player'; s.id=`seed-player-${seed}`;
      tile.appendChild(s);
    }
    row.appendChild(tile);
  }
  board.appendChild(row);
});

function updateTreasure(){
  document.querySelector('#playerBox.count').textContent = feasted.player;
  document.querySelector('#cpuBox.count').textContent = feasted.cpu;
}
function rollDice(faces){ return faces[Math.floor(Math.random()*faces.length)]; }

function animateDice(el, result){
  el.classList.add('rolling');
  beep(300);
  setTimeout(()=>{ el.textContent = result; el.classList.remove('rolling'); }, 600);
}

function setActiveDice(dice, enabled=true){
  [seedDice, moveDice].forEach(d => {
    d.classList.remove('active', 'disabled');
    if(!enabled) d.classList.add('disabled');
